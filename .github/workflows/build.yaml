name: Build Docker Images (Generated)

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  schedule:
    # Run daily at 2 AM UTC to check for updates
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push images even on PR'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  base-tini-v0-19-0:
    name: "Build tini:v0.19.0"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build tini:v0.19.0
        uses: ./.github/actions/build-dockerfile
        with:
          dockerfile_path: dockerfiles/base/tini/v0.19.0
          image_name: tini
          image_tag: v0.19.0
          force_push: ${{ inputs.force_push || 'false' }}
          registry: ${{ env.REGISTRY }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          root_path: ${{ env.REGISTRY }}/${{ github.repository_owner }}
          is_main_branch: ${{ github.ref == 'refs/heads/master' }}

  util-yq-4-47:
    name: "Build yq:4.47"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build yq:4.47
