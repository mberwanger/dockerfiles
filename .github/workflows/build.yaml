name: Build Docker Images

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  schedule:
    # Run daily at 2 AM UTC to check for updates
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_push:
        description: 'Force push images even on PR'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  DOCKERHUB_ENABLED: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

jobs:
  # Generate CI index to determine build order
  generate-index:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.index.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache: true

      - name: Build tools
        run: make build

      - name: Verify generated files are up to date
        run: |
          make generate-all
          if ! git diff --exit-code; then
            echo "❌ Generated files are out of date. Please run 'make generate-all' and commit the changes."
            exit 1
          fi

      - name: Generate dependency groups
        id: index
        run: |
          # Generate dependency groups using Go
          batches=$(make dependency-index)
          echo "batches=$batches" >> $GITHUB_OUTPUT

  # Create a matrix of individual batch jobs that run sequentially but with parallel builds within each
  build-batch:
    needs: generate-index
    if: needs.generate-index.outputs.batches != '[]' && needs.generate-index.outputs.batches != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1  # Ensures batches run sequentially
      matrix:
        batch_data: ${{ fromJson(needs.generate-index.outputs.batches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: env.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build batch ${{ matrix.batch_data.batch }} in parallel
        env:
          BATCH_NUM: ${{ matrix.batch_data.batch }}
          DOCKERFILES: ${{ toJson(matrix.batch_data.dockerfiles) }}
          FORCE_PUSH: ${{ inputs.force_push || 'false' }}
          IS_MAIN_BRANCH: ${{ github.ref == 'refs/heads/master' }}
          ROOT_PATH: ${{ env.REGISTRY }}/${{ github.repository_owner }}
        run: |
          build_image() {
            local dockerfile_path="$1"
            echo "🔨 Building: $dockerfile_path"

            # Determine image tags
            base_tag="${dockerfile_path//appliances\//}"
            image_tag="${ROOT_PATH}/${base_tag//\//:}"

            # Check if multi-platform build is needed
            if grep -q "TARGETPLATFORM" "$dockerfile_path/Dockerfile"; then
              platforms="linux/amd64,linux/arm64"
            else
              platforms="linux/amd64"
            fi

            # Set up cache directory
            cache_dir="$dockerfile_path/cache_result"
            mkdir -p "$cache_dir"

            # Get existing manifest for change detection
            before_manifest=""
            if docker manifest inspect "$image_tag" >/dev/null 2>&1; then
              before_manifest=$(docker manifest inspect "$image_tag" | jq -r '.manifests[]?.digest // empty' | sort)
            fi

            # Build with cache
            docker buildx build \
              --build-arg ROOT_PATH="$ROOT_PATH" \
              --cache-from="type=registry,ref=$image_tag" \
              --cache-to="type=local,dest=$cache_dir" \
              --platform="$platforms" \
              --tag="$image_tag" \
              $([ "$DOCKERHUB_ENABLED" == "true" ] && echo "--tag=instructure/${base_tag//\//:}") \
              "$dockerfile_path"

            # Check for changes using cache layers
            after_manifest=""
            if [ -f "$cache_dir/index.json" ]; then
              after_manifest=$(ci/get-cache-layers.sh "$cache_dir" 2>/dev/null || echo "")
            fi

            # Push if changes detected or forced
            should_push="false"
            if [ "$before_manifest" != "$after_manifest" ]; then
              echo "✅ Image changes detected for $dockerfile_path"
              should_push="true"
            elif [ "$FORCE_PUSH" == "true" ]; then
              echo "🔄 Force push enabled for $dockerfile_path"
              should_push="true"
            else
              echo "⏭️  No changes detected for $dockerfile_path"
            fi

            # Push images if needed and on main branch or forced
            if [ "$should_push" == "true" ] && ([ "$IS_MAIN_BRANCH" == "true" ] || [ "$FORCE_PUSH" == "true" ]); then
              echo "🚀 Pushing $dockerfile_path"
              docker buildx build \
                --build-arg ROOT_PATH="$ROOT_PATH" \
                --cache-from="type=registry,ref=$image_tag" \
                --platform="$platforms" \
                --push \
                --tag="$image_tag" \
                $([ "$DOCKERHUB_ENABLED" == "true" ] && echo "--tag=instructure/${base_tag//\//:}") \
                "$dockerfile_path"

              echo "CHANGED_IMAGE=$base_tag" >> "$GITHUB_ENV"
            fi
          }

          # Export function for subshells
          export -f build_image
          export ROOT_PATH DOCKERHUB_ENABLED FORCE_PUSH IS_MAIN_BRANCH

          echo "📦 Processing batch $BATCH_NUM"

          # Start all builds in this batch in parallel (background processes)
          pids=()
          echo "$DOCKERFILES" | jq -r '.[]' | while read -r dockerfile_path; do
            if [ -n "$dockerfile_path" ]; then
              build_image "$dockerfile_path" &
              pids+=($!)
            fi
          done

          # Wait for all builds in this batch to complete
          echo "⏳ Waiting for batch $BATCH_NUM builds to complete..."
          for pid in "${pids[@]}"; do
            wait "$pid"
          done
          echo "✅ Batch $BATCH_NUM completed"

      - name: Report changes
        if: env.CHANGED_IMAGE
        run: |
          echo "::notice title=Image Updated::Updated image: $CHANGED_IMAGE"

  # Notify about build results
  notify:
    needs: [generate-index, build-batch]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Notify on success
        if: needs.build-batch.result == 'success'
        run: |
          echo "✅ Docker image build completed successfully"
          # Add Slack notification here if needed

      - name: Notify on failure
        if: needs.build-batch.result == 'failure'
        run: |
          echo "❌ Docker image build failed"
          # Add Slack notification here if needed
          exit 1